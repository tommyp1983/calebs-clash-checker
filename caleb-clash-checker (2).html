<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caleb's Clash Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F4521E; --blue: #1A6FC4; --dark: #0d0d0d; --card: #161616;
    --card2: #1e1e1e; --border: #2c2c2c; --text: #efefef; --muted: #666;
    --clash: #FF3D00; --partial: #FF8F00; --ok: #00C853; --pending: #FFB300;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 60px; }

  .hero {
    position: relative; background: linear-gradient(160deg, #0a0a18 0%, #0d1a2e 60%, #0a0a0a 100%);
    border-bottom: 1px solid var(--border); overflow: hidden; min-height: 200px;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 28px;
  }
  .hero-player { position: absolute; bottom: 0; height: 210px; width: auto; object-fit: contain; object-position: bottom; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
  .hero-bball { left: -10px; opacity: 0.92; }
  .hero-soccer { right: -10px; opacity: 0.92; }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to right, #0a0a18 0%, transparent 28%, transparent 72%, #0a0a0a 100%),
                linear-gradient(to top, transparent 0%, transparent 60%, #0a0a18 100%);
    z-index: 1; pointer-events: none;
  }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 10px; }
  .hero-content h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; line-height: 1;
    background: linear-gradient(120deg, var(--orange) 0%, #fff 50%, var(--blue) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-content p { color: rgba(255,255,255,0.4); font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
  .hero-tags { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
  .hero-tag { font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .tag-bball  { background: rgba(244,82,30,0.2);  color: var(--orange); border: 1px solid rgba(244,82,30,0.4); }
  .tag-soccer { background: rgba(26,111,196,0.2); color: #64b5f6;       border: 1px solid rgba(26,111,196,0.4); }

  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--card); padding: 14px 8px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; letter-spacing: 1px; }
  .stat-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 3px; line-height: 1.3; }
  .stat.clashes .stat-num { color: var(--clash); } .stat.partial .stat-num { color: var(--partial); }
  .stat.clear .stat-num   { color: var(--ok); }   .stat.pending .stat-num { color: var(--pending); }

  .status-bar { background: var(--card2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.loading { background: var(--pending); animation: pulse 1s infinite; }
  .status-dot.ok      { background: var(--ok); }
  .status-dot.error   { background: var(--clash); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-btn { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--blue); color: var(--text); }

  .content { padding: 20px 16px; }
  .legend { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 0.78rem; color: var(--muted); }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ldot-clash { background: var(--clash); } .ldot-partial { background: var(--partial); }
  .ldot-ok    { background: var(--ok); }    .ldot-pending { background: var(--border); border: 1px solid var(--muted); }

  .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: var(--muted); margin-bottom: 12px; margin-top: 24px; }
  .round-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .card-accent { height: 3px; }
  .accent-clash   { background: linear-gradient(90deg,var(--clash),#ff7043); }
  .accent-partial { background: linear-gradient(90deg,var(--partial),#ffcc02); }
  .accent-ok      { background: linear-gradient(90deg,var(--ok),#69f0ae); }
  .accent-pending { background: var(--border); }
  .card-body { padding: 14px 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .round-num  { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: var(--muted); }
  .round-date { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-top: 1px; }
  .badge { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 11px; border-radius: 99px; white-space: nowrap; }
  .badge-clash   { background: rgba(255,61,0,0.15);  color: var(--clash);   border: 1px solid rgba(255,61,0,0.35); }
  .badge-partial { background: rgba(255,143,0,0.15); color: var(--partial); border: 1px solid rgba(255,143,0,0.35); }
  .badge-ok      { background: rgba(0,200,83,0.12);  color: var(--ok);      border: 1px solid rgba(0,200,83,0.3); }
  .badge-pending { background: rgba(255,179,0,0.1);  color: var(--pending); border: 1px solid rgba(255,179,0,0.25); }
  .game-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-top: 1px solid var(--border); }
  .sport-dot { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 1px; }
  .dot-bball  { background: rgba(244,82,30,0.2);  border: 1px solid rgba(244,82,30,0.5); }
  .dot-soccer { background: rgba(26,111,196,0.2); border: 1px solid rgba(26,111,196,0.5); }
  .game-detail { flex: 1; }
  .game-sport { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .game-time  { font-size: 0.92rem; font-weight: 600; color: var(--text); margin: 2px 0; }
  .game-venue { font-size: 0.74rem; color: var(--muted); line-height: 1.4; }
  .travel-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 99px; padding: 2px 9px; font-size: 0.68rem; color: var(--muted); margin-top: 5px; }
  .alert-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.78rem; line-height: 1.55; }
  .alert-clash   { background: rgba(255,61,0,0.08);  border: 1px solid rgba(255,61,0,0.2);  color: #ff8a65; }
  .alert-partial { background: rgba(255,143,0,0.08); border: 1px solid rgba(255,143,0,0.2); color: #ffcc80; }
  .no-soccer-msg  { font-size: 0.78rem; color: var(--muted); font-style: italic; padding: 8px 0 0; border-top: 1px solid var(--border); }
  .soccer-loading { font-size: 0.78rem; color: var(--pending); font-style: italic; padding: 8px 0 0; border-top: 1px solid var(--border); animation: pulse 1s infinite; }
  .divider-line { height: 1px; background: var(--border); margin: 24px 0 16px; }

  /* Debug panel */
  .debug-box { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.72rem; color: #888; font-family: monospace; line-height: 1.8; }
  .debug-box summary { cursor: pointer; color: #aaa; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; }
</style>
</head>

const KNOWN_TRAVEL = { Warwick:12, Joondalup:18, Morley:20, Lakeside:35, Willetton:35 };
function getTravelMins(v) { for(const[k,m] of Object.entries(KNOWN_TRAVEL)){ if(v.includes(k)) return m; } return 20; }
function getSoccerTravel(l) { if(!l) return 10; if(l.toLowerCase().includes('sorrento')||l.toLowerCase().includes('carine')) return 8; return 15; }
function toMins(t) { if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; }
function minsToHHMM(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function fmt12(t) { if(!t) return '?'; let[h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; if(h>12)h-=12; if(h===0)h=12; return h+':'+String(m).padStart(2,'0')+ap; }
function fmtDate(s) { const[y,mo,d]=s.split('-').map(Number); const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return days[new Date(y,mo-1,d).getDay()]+' '+d+' '+months[mo-1]; }

function parseIcal(text) {
  const events=[];
  const blocks=text.split('BEGIN:VEVENT');
  for(let i=1;i<blocks.length;i++) {
    const b=blocks[i];
    const get=k=>{ const m=b.match(new RegExp(k+'[^:\\r\\n]*:([^\\r\\n]+)')); return m?m[1].trim():null; };
    const dtstart=get('DTSTART'),dtend=get('DTEND'),summary=get('SUMMARY')||'',location=get('LOCATION')||'';
    if(!dtstart) continue;
    const pd=s=>{ const d=s.replace(/\D/g,''); return d.length<8?null:{date:d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8),time:d.length>=12?d.slice(8,10)+':'+d.slice(10,12):null}; };
    const start=pd(dtstart),end=pd(dtend);
    if(start) events.push({date:start.date,startTime:start.time,endTime:end?.time||null,summary,location});
  }
  return events;
}

function analyse(game,soccer) {
  if(!soccer.length) return {type:'pending',results:[]};
  const bt=getTravelMins(game.venue),bLeave=toMins(game.arrive)-bt,bStart=toMins(game.arrive),bEnd=toMins(game.finish);
  const results=soccer.map(s=>{
    const st=getSoccerTravel(s.location),kick=toMins(s.startTime),sNeedBy=kick-WARMUP,sLeave=sNeedBy-st,sEnd=s.endTime?toMins(s.endTime):kick+60;
    const overlaps=bLeave<sEnd&&sLeave<bEnd;
    let clashType='ok',message='';
    if(overlaps){
      const ab=bEnd+st,as2=sEnd+bt;
      if(ab<=sNeedBy){ clashType='ok'; message='✅ Tight but fine — basketball ends '+fmt12(game.finish)+', ~'+st+' min drive, arrive soccer '+fmt12(minsToHHMM(ab))+' (kickoff '+fmt12(s.startTime)+').'; }
      else if(as2<=bStart){ clashType='ok'; message='✅ Soccer finishes in time for basketball.'; }
      else if(ab<sEnd){ clashType='partial'; message='🟡 Basketball ends '+fmt12(game.finish)+'. After ~'+st+' min drive, Caleb arrives soccer ~'+fmt12(minsToHHMM(ab))+' — '+(ab-kick)+' min into the game. Can play the rest (coach permitting).'; }
      else{ clashType='clash'; message='🔴 Basketball runs until '+fmt12(game.finish)+'. Caleb would miss all of soccer (kickoff '+fmt12(s.startTime)+', ends ~'+fmt12(minsToHHMM(sEnd))+').'; }
    }
    return {soccer:s,clashType,message,bt,st,bLeave,sLeave,sNeedBy,kick,sEnd};
  });
  const types=results.map(r=>r.clashType);
  return {type:types.includes('clash')?'clash':types.includes('partial')?'partial':'ok',results,bt};
}

let soccerByDate={},soccerLoaded=false;

function buildCards() {
  let counts={clash:0,partial:0,ok:0,pending:0};
  const clashCards=[],partialCards=[],allCards=[];
  for(const game of BBALL){
    const soccer=soccerByDate[game.date]||[],A=analyse(game,soccer);
    counts[A.type]++;
    const accent={clash:'accent-clash',partial:'accent-partial',ok:'accent-ok',pending:'accent-pending'}[A.type];
    const bc={clash:'badge-clash',partial:'badge-partial',ok:'badge-ok',pending:'badge-pending'}[A.type];
    const bt_={clash:'🔴 Hard Clash',partial:'🟡 Partial',ok:'✅ Clear',pending:'⏳ Awaiting'}[A.type];
    const bt=A.bt||getTravelMins(game.venue),bLeave=toMins(game.arrive)-bt;
    const tipOff=fmt12(minsToHHMM(toMins(game.arrive)+60));
    const bRow=`<div class="game-row"><div class="sport-dot dot-bball">🏀</div><div class="game-detail"><div class="game-sport">Basketball · Warwick Senators U12 · FIXED</div><div class="game-time">${fmt12(game.arrive)} – ${fmt12(game.finish)} (${tipOff} Tip Off)</div><div class="game-venue">${game.venue}</div><div class="travel-chip">🚗 ~${bt} min · leave by ${fmt12(minsToHHMM(bLeave))}</div></div></div>`;
    let sHTML='';
    if(!soccerLoaded){ sHTML='<div class="soccer-loading">⚽ Loading soccer fixture…</div>'; }
    else if(!soccer.length){ sHTML='<div class="no-soccer-msg">⚽ No soccer fixture published for this Sunday yet</div>'; }
    else for(const r of A.results){
      const s=r.soccer;
      const duration=s.endTime?toMins(s.endTime)-r.kick:60;
      const placeholderTime=duration>180;
      const sArrive=fmt12(minsToHHMM(r.sNeedBy));
      const sEnd=s.endTime?fmt12(s.endTime):fmt12(minsToHHMM(r.kick+60));
      const sTimeDisplay=placeholderTime?'⏰ Game time not yet released':`${sArrive} – ${sEnd} (${fmt12(s.startTime)} Kick Off)`;
      sHTML+=`<div class="game-row"><div class="sport-dot dot-soccer">⚽</div><div class="game-detail"><div class="game-sport">Soccer · SFC u10 Blue 1 · Flexible</div><div class="game-time">${sTimeDisplay}</div><div class="game-venue">${s.summary}${s.location?' · '+s.location:''}</div><div class="travel-chip">🚗 ~${r.st} min · leave by ${fmt12(minsToHHMM(r.sLeave))} · arrive ${fmt12(minsToHHMM(r.sNeedBy))} (30 min warmup)</div></div></div>${r.message?`<div class="alert-box ${r.clashType==='clash'?'alert-clash':r.clashType==='partial'?'alert-partial':''}">${r.message}</div>`:''}`;
    }
    const card=`<div class="round-card"><div class="card-accent ${accent}"></div><div class="card-body"><div class="card-header"><div><div class="round-num">Round ${game.rd}</div><div class="round-date">${fmtDate(game.date)}</div></div><span class="badge ${bc}">${bt_}</span></div>${bRow}${sHTML}</div></div>`;
    if(A.type==='clash') clashCards.push(card);
    if(A.type==='partial') partialCards.push(card);
    allCards.push(card);
  }
  document.getElementById('numClashes').textContent=counts.clash;
  document.getElementById('numPartial').textContent=counts.partial;
  document.getElementById('numClear').textContent=counts.ok;
  document.getElementById('numPending').textContent=counts.pending;
  let html=`<div class="legend"><div class="legend-row"><div class="ldot ldot-clash"></div><span><strong style="color:var(--text)">Hard Clash</strong> — basketball is fixed; Caleb misses all of soccer</span></div><div class="legend-row"><div class="ldot ldot-partial"></div><span><strong style="color:var(--text)">Partial Clash</strong> — Caleb can join soccer late after basketball</span></div><div class="legend-row"><div class="ldot ldot-ok"></div><span><strong style="color:var(--text)">Clear</strong> — both games fit including travel</span></div><div class="legend-row"><div class="ldot ldot-pending"></div><span><strong style="color:var(--text)">Awaiting</strong> — soccer fixture not yet published</span></div></div>`;
  if(clashCards.length)   html+=`<div class="section-label">🔴 Hard Clashes</div>`+clashCards.join('')+`<div class="divider-line"></div>`;
  if(partialCards.length) html+=`<div class="section-label">🟡 Partial Clashes</div>`+partialCards.join('')+`<div class="divider-line"></div>`;
  html+=`<div class="section-label">All Rounds</div>`+allCards.join('');
  document.getElementById('content').innerHTML=html;
}

function processSoccer(text) {
  const events = parseIcal(text);
  soccerByDate = {};
  for(const ev of events) {
    if(!soccerByDate[ev.date]) soccerByDate[ev.date]=[];
    soccerByDate[ev.date].push(ev);
  }
  soccerLoaded = true;
  document.getElementById('statusDot').className='status-dot ok';
  document.getElementById('statusText').textContent='Soccer feed loaded · '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
}
